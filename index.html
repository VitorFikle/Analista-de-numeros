<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista de Números</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Analista de Números</h1>
        <button id="lightModeBtn"></button>
    </header>

    <main id="content">
        <div class="campo">
        <p>Digite abaixo um número entre 1 e 100: </p>
        <input type="number" id="numero" placeholder="Digite aqui o seu número.">
        <button id="adicionar">ADICIONAR</button>
        <button id="finalizar">FINALIZAR</button>
        </div>

        <div id="numberList">
            <h2>Números adicionados foram:</h2>
            <ul id="lista"></ul>
        </div>

        <div id="res">
            <h2 class="stateRes">Resultados:</h2>
            <div class="stateRes length"></div>
            <div class="stateRes max"></div>
            <div class="stateRes min"></div>
            <div class="stateRes sum"></div>
            <div class="stateRes media"></div>
        </div>

    </main>

    <footer>
        <p>©Vitor da Silva</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
